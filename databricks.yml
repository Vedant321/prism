bundle:
  name: prism-health-concierge

resources:
  apps:
    prism-concierge:
      name: prism-concierge
      source_code_path: .
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: c57ba8d2cc03799e
            permission: CAN_USE
      config:
        command:
          - npm
          - run
          - start
        env:
          - name: PRISM_DATA_MODE
            value: "databricks"
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: PRISM_DATABRICKS_TABLE
            value: "databricks_virtue_foundation_dataset_dais_2026.virtue_foundation_dataset.facilities"

targets:
  dev:
    default: true
